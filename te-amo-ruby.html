<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te amo Ruby 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, #1a0020 0%, #0d000f 60%, #000000 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }

  /* ───── Stars (ocultas al inicio) ───── */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0; transition: opacity 1.4s ease; }
  .stars.show { opacity: 1; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d) ease-in-out infinite alternate; opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.5); }
    100% { opacity: var(--op); transform: scale(1.2); }
  }

  /* ───── Corazón principal ───── */
  #main-heart {
    font-size: 10rem;
    cursor: pointer;
    position: relative;
    z-index: 20;
    transition: transform 0.15s ease;
    animation: heartbeat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px #ff2060) drop-shadow(0 0 50px #ff0040);
    user-select: none;
    -webkit-user-select: none;
  }
  #main-heart:hover { transform: scale(1.12); }
  #main-heart.explode {
    animation: explodeHeart 0.6s ease-out forwards;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 20px #ff2060) drop-shadow(0 0 50px #ff0040); }
    50%     { transform: scale(1.15); filter: drop-shadow(0 0 40px #ff60a0) drop-shadow(0 0 90px #ff2060); }
  }
  @keyframes explodeHeart {
    0%   { transform: scale(1);    opacity: 1; }
    40%  { transform: scale(2.2); opacity: 1; }
    100% { transform: scale(0);    opacity: 0; }
  }

  /* hint text */
  #hint {
    position: absolute;
    bottom: -3rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,160,200,0.6);
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeInOut 2.5s ease-in-out infinite;
    white-space: nowrap;
    pointer-events: none;
  }
  @keyframes fadeInOut { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

  /* wrapper del corazón para centrar el hint */
  #heart-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;
  }

  /* ───── Todo lo que aparece al hacer click ───── */
  #show-layer {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
    z-index: 5;
  }
  #show-layer.show { opacity: 1; pointer-events: auto; }

  /* ───── Pétalos cayendo ───── */
  .petal {
    position: fixed; top: -60px;
    font-size: var(--s);
    animation: fall var(--d) linear infinite var(--delay);
    filter: drop-shadow(0 0 4px var(--glow));
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0); opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
  }

  /* ───── Corazones flotando desde abajo ───── */
  .heart-float {
    position: fixed; bottom: -80px;
    font-size: var(--s);
    animation: floatUp var(--d) ease-in infinite var(--delay);
    filter: drop-shadow(0 0 8px #ff4d8d);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.4) rotate(var(--rot)); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) scale(1.2) rotate(calc(var(--rot) + 30deg)); opacity: 0; }
  }

  /* ───── Sparkles ───── */
  .sparkle {
    position: fixed;
    pointer-events: none;
    animation: sparkleAnim var(--d) ease-in-out infinite var(--delay);
    font-size: var(--s);
    left: var(--x); top: var(--y);
    opacity: 0;
    z-index: 6;
  }
  @keyframes sparkleAnim {
    0%,100% { opacity:0; transform:scale(0) rotate(0deg); }
    50%     { opacity:1; transform:scale(1.3) rotate(180deg); }
  }

  /* ───── Card ───── */
  .card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 15;
    text-align: center;
    padding: 55px 65px;
    border-radius: 32px;
    background: rgba(80, 0, 40, 0.38);
    backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255, 100, 160, 0.35);
    box-shadow: 0 0 60px rgba(255,50,120,.25), 0 0 120px rgba(180,0,80,.15);
    transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s,
                opacity 0.5s ease 0.4s;
    opacity: 0;
    max-width: 90vw;
    width: 520px;
  }
  .card.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    animation: cardBreath 4s ease-in-out infinite 1.2s;
  }
  @keyframes cardBreath {
    0%,100% { box-shadow: 0 0 60px rgba(255,50,120,.25), 0 0 120px rgba(180,0,80,.15); }
    50%     { box-shadow: 0 0 90px rgba(255,50,120,.45), 0 0 180px rgba(180,0,80,.30); }
  }
  .card::before {
    content: '';
    position: absolute; inset: -3px; border-radius: 34px;
    background: linear-gradient(45deg, #ff0050, #ff80b0, #c0006b, #ff4d8d, #ff0050);
    background-size: 300% 300%;
    z-index: -1;
    animation: borderSpin 4s linear infinite;
    opacity: 0.7;
  }
  @keyframes borderSpin {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .deco-hearts {
    font-size: 2rem; margin-bottom: 14px;
    animation: bounce 2s ease-in-out infinite;
    display: block; letter-spacing: 10px;
    filter: drop-shadow(0 0 10px #ff2d78);
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0) scale(1); }
    50%     { transform: translateY(-10px) scale(1.12); }
  }
  .flower-ring {
    font-size: 1.6rem; margin-bottom: 22px;
    animation: spreadFlowers 5s ease-in-out infinite;
    display: block; letter-spacing: 4px;
    filter: drop-shadow(0 0 8px #ff80b0);
  }
  @keyframes spreadFlowers {
    0%,100% { letter-spacing: 4px; }
    50%     { letter-spacing: 14px; }
  }
  .main-text {
    font-size: 4rem; font-weight: bold; line-height: 1.1;
    background: linear-gradient(135deg, #fff0f5 0%, #ffb3d1 30%, #ff4d8d 60%, #c0006b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: textGlow 3s ease-in-out infinite alternate;
    display: block; margin-bottom: 10px;
  }
  @keyframes textGlow {
    0%   { filter: drop-shadow(0 0 12px #ff4d8d); }
    100% { filter: drop-shadow(0 0 28px #ff80b0) drop-shadow(0 0 50px #ff2060); }
  }
  .name {
    font-size: 4.8rem;
    background: linear-gradient(135deg, #ffd6e8 0%, #ff79b0 40%, #ff003c 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: namePulse 2.5s ease-in-out infinite alternate;
    display: block;
  }
  @keyframes namePulse {
    0%   { filter: drop-shadow(0 0 16px #ff4d8d); letter-spacing: 6px; }
    100% { filter: drop-shadow(0 0 32px #ff80b0) drop-shadow(0 0 60px #ff2060); letter-spacing: 10px; }
  }
  .subtitle {
    margin-top: 24px; font-size: 1rem;
    color: rgba(255,200,220,0.75);
    letter-spacing: 3px; text-transform: uppercase;
    animation: fadeInOut 4s ease-in-out infinite;
  }
  .bottom-flowers {
    margin-top: 22px; font-size: 1.9rem; letter-spacing: 8px;
    animation: wiggle 3s ease-in-out infinite;
    display: block; filter: drop-shadow(0 0 8px #ff6090);
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-4deg); }
    50%     { transform: rotate(4deg); }
  }

  /* orbits */
  .orbit {
    position: absolute; inset: -80px; border-radius: 50%;
    pointer-events: none; animation: orbitSpin 12s linear infinite; z-index: 5;
  }
  .orbit-heart {
    position: absolute; font-size: 1.4rem; top: 0; left: 50%;
    transform-origin: 0 80px; filter: drop-shadow(0 0 6px #ff4d8d);
  }
  @keyframes orbitSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .orbit2 { animation-duration: 18s; animation-direction: reverse; inset: -50px; }

  /* ───── Click burst ───── */
  .burst-particle {
    position: fixed; pointer-events: none; z-index: 999;
    transition: transform 1.2s ease-out, opacity 1.2s ease-out;
  }
</style>
</head>
<body>

<!-- Estrellas -->
<div class="stars" id="stars"></div>

<!-- Capa de todo lo que aparece al click -->
<div id="show-layer">
  <!-- Petals, hearts y sparkles se generan con JS aquí -->
</div>

<!-- Card -->
<div class="card" id="card">
  <div class="orbit" id="orbit1"></div>
  <div class="orbit orbit2" id="orbit2"></div>
  <span class="deco-hearts">💖 💗 💖 💗 💖</span>
  <span class="flower-ring">🌸 🌺 🌹 🌷 🌸 🌺 🌹 🌷</span>
  <span class="main-text">Te amo</span>
  <span class="name">Ruby</span>
  <p class="subtitle">✨ para siempre y más allá ✨</p>
  <span class="bottom-flowers">🌹 💕 🌸 💕 🌹</span>
</div>

<!-- Corazón principal -->
<div id="heart-wrapper">
  <div id="main-heart">💖</div>
  <div id="hint">tócame ✨</div>
</div>

<script>
  let revealed = false;

  /* ── Estrellas ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--op:${(Math.random()*0.7+0.3).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }

  /* ── Generar partículas (ocultas) ── */
  const layer = document.getElementById('show-layer');
  const petalEmojis  = ['🌸','🌺','🌹','🌷','🍀','🌼'];
  const glows        = ['#ff80b0','#ff4d8d','#ffb3d1','#ff003c','#ffd6e8'];
  const heartEmojis  = ['💖','💗','💓','💕','💞','💝','❤️'];
  const sparkleGlyphs= ['✨','⭐','💫','🌟'];

  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const drift = (Math.random()-0.5)*300;
    p.style.cssText = `left:${Math.random()*110-5}%;--s:${(Math.random()*1.6+1).toFixed(1)}rem;--d:${(Math.random()*8+7).toFixed(1)}s;--delay:-${(Math.random()*12).toFixed(1)}s;--drift:${drift.toFixed(0)}px;--glow:${glows[Math.floor(Math.random()*glows.length)]};`;
    p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
    layer.appendChild(p);
  }

  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    const rot = (Math.random()*40-20).toFixed(0);
    h.style.cssText = `--s:${(Math.random()*2+1.2).toFixed(1)}rem;--d:${(Math.random()*7+6).toFixed(1)}s;--delay:-${(Math.random()*14).toFixed(1)}s;left:${(Math.random()*100).toFixed(1)}%;--rot:${rot}deg;`;
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    layer.appendChild(h);
  }

  for (let i = 0; i < 22; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.style.cssText = `--s:${(Math.random()*1.5+0.8).toFixed(1)}rem;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:-${(Math.random()*5).toFixed(1)}s;--x:${(Math.random()*100).toFixed(1)}%;--y:${(Math.random()*100).toFixed(1)}%;`;
    sp.textContent = sparkleGlyphs[Math.floor(Math.random()*sparkleGlyphs.length)];
    layer.appendChild(sp);
  }

  /* ── Orbit hearts ── */
  const orbit1 = document.getElementById('orbit1');
  const orbit2 = document.getElementById('orbit2');
  for (let i = 0; i < 6; i++) {
    const oh = document.createElement('div'); oh.className = 'orbit-heart';
    oh.textContent = ['💖','💗','💕','💓'][i%4];
    oh.style.transform = `rotate(${i*60}deg) translateY(-120px)`; orbit1.appendChild(oh);
  }
  for (let i = 0; i < 5; i++) {
    const oh = document.createElement('div'); oh.className = 'orbit-heart';
    oh.textContent = ['🌸','🌺','🌹','🌷','🌼'][i%5];
    oh.style.transform = `rotate(${i*72}deg) translateY(-95px)`; oh.style.fontSize='1.2rem'; orbit2.appendChild(oh);
  }

  /* ── Click en el corazón principal ── */
  const mainHeart   = document.getElementById('main-heart');
  const heartWrapper= document.getElementById('heart-wrapper');
  const card        = document.getElementById('card');
  const hint        = document.getElementById('hint');

  mainHeart.addEventListener('click', (e) => {
    if (revealed) return;
    revealed = true;

    /* burst en el punto del click */
    spawnBurst(e.clientX, e.clientY, 20);

    /* animación de explosión del corazón */
    mainHeart.classList.add('explode');

    setTimeout(() => {
      heartWrapper.style.display = 'none';
    }, 620);

    /* mostrar todo */
    starsEl.classList.add('show');
    layer.classList.add('show');

    setTimeout(() => {
      card.classList.add('show');
    }, 400);
  });

  /* ── Burst de partículas ── */
  const burstEmojis = ['💖','💗','✨','💫','🌸','💕','🌟','❤️'];
  function spawnBurst(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'burst-particle';
      b.style.cssText = `left:${cx}px;top:${cy}px;font-size:${Math.random()*2+0.9}rem;opacity:1;transform:translate(0,0) scale(1);`;
      b.textContent = burstEmojis[Math.floor(Math.random()*burstEmojis.length)];
      document.body.appendChild(b);
      const angle = Math.random()*Math.PI*2;
      const dist  = Math.random()*180+60;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        b.style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist-80}px) scale(0.1)`;
        b.style.opacity   = '0';
      }));
      setTimeout(() => b.remove(), 1300);
    }
  }

  /* ── Burst al hacer click en cualquier lugar (después de revelar) ── */
  document.addEventListener('click', (e) => {
    if (!revealed || e.target === mainHeart) return;
    spawnBurst(e.clientX, e.clientY, 10);
  });
</script>
</body>
</html>
